<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4A93B" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#241A10" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Quiz de culture générale quotidien façon Wordle, avec mode libre par catégorie ou niveau."
    />

    <!-- Aperçu social (Open Graph) : ce qui s'affiche quand le lien est collé sur WhatsApp, iMessage, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quiz-culture-generale-beta.vercel.app" />
    <meta property="og:title" content="Quiz Culture Générale" />
    <meta
      property="og:description"
      content="Le défi quotidien façon Wordle. 10 questions, du plus facile au plus difficile, et un mode libre par catégorie ou niveau."
    />
    <meta property="og:image" content="https://quiz-culture-generale-beta.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter/X reprend Open Graph par défaut, mais ces balises garantissent le format "grande image" -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quiz Culture Générale" />
    <meta
      name="twitter:description"
      content="Le défi quotidien façon Wordle. 10 questions, du plus facile au plus difficile."
    />
    <meta name="twitter:image" content="https://quiz-culture-generale-beta.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Quiz Culture Générale</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
